{% extends 'base.html' %}
{% block title %}Edit Patient — MediCare HMS{% endblock %}
{% block page_title %}Edit Patient{% endblock %}

{% block content %}
<div class="card" style="max-width:900px;">
  <div class="card-header">
    <span class="card-title">Edit: {{ patient.first_name }} {{ patient.last_name }}</span>
    <a href="{{ url_for('view_patient', id=patient.id) }}" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-left"></i> Back</a>
  </div>
  <div class="card-body">
    <form method="post">
      <div class="form-grid">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" name="first_name" value="{{ patient.first_name }}" required>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" name="last_name" value="{{ patient.last_name }}" required>
        </div>
        <div class="form-group">
          <label>Date of Birth *</label>
          <input type="date" name="dob" value="{{ patient.date_of_birth }}" required>
        </div>
        <div class="form-group">
          <label>Gender *</label>
          <select name="gender" required>
            {% for g in ['Male','Female','Other'] %}
            <option {% if patient.gender==g %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" name="phone" value="{{ patient.phone }}" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" value="{{ patient.email or '' }}">
        </div>
        <div class="form-group">
          <label>Blood Group</label>
          <select name="blood_group">
            <option value="">Unknown</option>
            {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
            <option {% if patient.blood_group==bg %}selected{% endif %}>{{ bg }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Emergency Contact</label>
          <input type="text" name="emergency_contact" value="{{ patient.emergency_contact or '' }}">
        </div>
        <div class="form-group full">
          <label>Address</label>
          <textarea name="address">{{ patient.address or '' }}</textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
        <a href="{{ url_for('view_patient', id=patient.id) }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
