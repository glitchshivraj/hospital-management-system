{% extends 'base.html' %}
{% block title %}Register Patient — MediCare HMS{% endblock %}
{% block page_title %}Register New Patient{% endblock %}

{% block content %}
<div class="card" style="max-width:900px;">
  <div class="card-header">
    <span class="card-title">Patient Registration Form</span>
    <a href="{{ url_for('patients') }}" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-left"></i> Back</a>
  </div>
  <div class="card-body">
    <form method="post">
      <div class="form-grid">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" name="first_name" required placeholder="e.g. Priya">
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" name="last_name" required placeholder="e.g. Sharma">
        </div>
        <div class="form-group">
          <label>Date of Birth *</label>
          <input type="date" name="dob" required>
        </div>
        <div class="form-group">
          <label>Gender *</label>
          <select name="gender" required>
            <option value="">Select gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" name="phone" required placeholder="e.g. 9876543210">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="patient@email.com">
        </div>
        <div class="form-group">
          <label>Blood Group</label>
          <select name="blood_group">
            <option value="">Unknown</option>
            {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
            <option>{{ bg }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Emergency Contact</label>
          <input type="text" name="emergency_contact" placeholder="Name – Phone">
        </div>
        <div class="form-group full">
          <label>Address</label>
          <textarea name="address" placeholder="Full residential address"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Register Patient</button>
        <a href="{{ url_for('patients') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
