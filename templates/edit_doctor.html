{% extends 'base.html' %}
{% block title %}Edit Doctor — MediCare HMS{% endblock %}
{% block page_title %}Edit Doctor{% endblock %}

{% block content %}
<div class="card" style="max-width:900px;">
  <div class="card-header">
    <span class="card-title">Edit: Dr. {{ doctor.first_name }} {{ doctor.last_name }}</span>
    <a href="{{ url_for('view_doctor', id=doctor.id) }}" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-left"></i> Back</a>
  </div>
  <div class="card-body">
    <form method="post">
      <div class="form-grid">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" name="first_name" value="{{ doctor.first_name }}" required>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" name="last_name" value="{{ doctor.last_name }}" required>
        </div>
        <div class="form-group">
          <label>Specialization *</label>
          <select name="specialization" required>
            {% for spec in ['Cardiology','Neurology','Pediatrics','Orthopedics','Dermatology',
                            'General Medicine','ENT','Ophthalmology','Psychiatry','Oncology',
                            'Gynecology','Urology','Radiology','Anesthesiology','Emergency Medicine'] %}
            <option {% if doctor.specialization==spec %}selected{% endif %}>{{ spec }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Qualification</label>
          <input type="text" name="qualification" value="{{ doctor.qualification or '' }}">
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" name="phone" value="{{ doctor.phone }}" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" value="{{ doctor.email or '' }}">
        </div>
        <div class="form-group">
          <label>Years of Experience</label>
          <input type="number" name="experience" min="0" max="50" value="{{ doctor.experience_years }}">
        </div>
        <div class="form-group">
          <label>Availability</label>
          <input type="text" name="availability" value="{{ doctor.availability }}">
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
        <a href="{{ url_for('view_doctor', id=doctor.id) }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
